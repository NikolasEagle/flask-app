stages:
  - build

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG

build-task:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - >
      docker login $CI_REGISTRY
      -u $CI_REGISTRY_USER 
      -p $CI_REGISTRY_PASSWORD
  script:
    - echo $CI_COMMIT_MESSAGE
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
