stages:
  - test
  - build

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

test-task:
  stage: test
  script:
    - echo "Hello!"

build-task:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - >
      docker login $CI_REGISTRY
      -u $CI_REGISTRY_USER 
      -p $CI_REGISTRY_PASSWORD
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"