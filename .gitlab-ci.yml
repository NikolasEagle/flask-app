stages:
  - build

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  CONFIG_FILES: ".gitlab-ci.yml .github/workflows/main.yml"
  DOCS_FILES: "README.md LICENSE"
  DEV_FILES: "requirements.txt"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - $CONFIG_FILES
        - $DOCS_FILES
        - $DEV_FILES
      when: never
    - when: always

build-task:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - >
      docker login $CI_REGISTRY
      -u $CI_REGISTRY_USER 
      -p $CI_REGISTRY_PASSWORD
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
